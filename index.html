<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Taskboard"/>
  <meta name="theme-color" content="#ff6b35"/>
  <meta name="description" content="Your personal task manager"/>
  <title>Taskboard</title>

  <!-- Real manifest file — required for Chrome install prompt -->
  <link rel="manifest" href="/Taskboard/manifest.json"/>
  <link rel="apple-touch-icon" href="/Taskboard/icon-192.png"/>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
      --ink: #f0eee8; --ink-dim: #7a7a90; --accent: #ff6b35; --accent2: #ffd166;
      --border: #2a2a38; --cat-work: #4facfe; --cat-personal: #a78bfa;
      --cat-health: #34d399; --cat-shopping: #fbbf24; --cat-other: #94a3b8;
      --radius: 16px; --bottom-nav: 80px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html { height: 100%; }
    body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--ink); display:flex; flex-direction:column; height:100%; max-width:480px; margin:0 auto; overflow:hidden; }

    /* INSTALL BANNER */
    #install-banner { display:none; position:fixed; bottom:calc(var(--bottom-nav) + 12px + var(--safe-bottom)); left:50%; transform:translateX(-50%); width:calc(100% - 32px); max-width:448px; background:var(--surface); border:1.5px solid var(--accent); border-radius:20px; padding:16px 18px; z-index:200; box-shadow:0 8px 32px rgba(0,0,0,0.5); animation:slideUp .35s cubic-bezier(.34,1.3,.64,1); }
    #install-banner.show { display:flex; gap:14px; align-items:center; }
    @keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .install-icon { width:48px; height:48px; background:linear-gradient(135deg,#ff6b35,#ff9f1c); border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
    .install-text { flex:1; }
    .install-text strong { display:block; font-family:'Syne',sans-serif; font-size:.95rem; margin-bottom:2px; }
    .install-text span { font-size:.75rem; color:var(--ink-dim); }
    .install-actions { display:flex; gap:8px; flex-shrink:0; }
    .btn-install { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:8px 16px; font-family:'Syne',sans-serif; font-size:.85rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    .btn-dismiss { background:var(--surface2); color:var(--ink-dim); border:none; border-radius:10px; padding:8px 10px; font-size:.85rem; cursor:pointer; }

    /* HEADER */
    .app-header { padding:calc(var(--safe-top) + 48px) 20px 14px; flex-shrink:0; background:var(--bg); }
    .header-row { display:flex; align-items:center; justify-content:space-between; }
    .app-title { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:800; letter-spacing:-.5px; }
    .app-title span { color:var(--accent); }
    .summary-pill { background:var(--surface2); border-radius:20px; padding:6px 14px; font-size:.78rem; color:var(--ink-dim); font-weight:500; }
    .summary-pill b { color:var(--accent2); font-weight:600; }

    /* CHIPS */
    .chip-scroll { padding:8px 20px 4px; display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; flex-shrink:0; }
    .chip-scroll::-webkit-scrollbar { display:none; }
    .chip { flex-shrink:0; padding:7px 16px; border-radius:20px; font-size:.8rem; font-weight:600; border:1.5px solid var(--border); background:none; color:var(--ink-dim); cursor:pointer; transition:all .18s; white-space:nowrap; font-family:'Nunito',sans-serif; }
    .chip.active-chip { border-color:var(--accent); color:var(--accent); background:rgba(255,107,53,.1); }
    .chip.cat-work.active-chip    { border-color:var(--cat-work);     color:var(--cat-work);     background:rgba(79,172,254,.1); }
    .chip.cat-personal.active-chip { border-color:var(--cat-personal); color:var(--cat-personal); background:rgba(167,139,250,.1); }
    .chip.cat-health.active-chip  { border-color:var(--cat-health);   color:var(--cat-health);   background:rgba(52,211,153,.1); }
    .chip.cat-shopping.active-chip { border-color:var(--cat-shopping); color:var(--cat-shopping); background:rgba(251,191,36,.1); }
    .chip.cat-other.active-chip   { border-color:var(--cat-other);    color:var(--cat-other);    background:rgba(148,163,184,.1); }

    /* SCROLL */
    .scroll-area { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:10px 16px calc(var(--bottom-nav) + var(--safe-bottom) + 20px); scrollbar-width:none; }
    .scroll-area::-webkit-scrollbar { display:none; }

    /* TASK CARD */
    .task-card { background:var(--surface); border-radius:var(--radius); padding:15px 14px; display:flex; align-items:center; gap:12px; margin-bottom:10px; border:1px solid var(--border); animation:popIn .22s cubic-bezier(.34,1.56,.64,1); position:relative; overflow:hidden; transition:transform .15s; user-select:none; }
    .task-card:active { transform:scale(.98); }
    .task-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px 0 0 3px; }
    .task-card.cat-work::before    { background:var(--cat-work); }
    .task-card.cat-personal::before { background:var(--cat-personal); }
    .task-card.cat-health::before  { background:var(--cat-health); }
    .task-card.cat-shopping::before { background:var(--cat-shopping); }
    .task-card.cat-other::before   { background:var(--cat-other); }
    .task-card.done { opacity:.5; }
    @keyframes popIn { from{opacity:0;transform:scale(.94) translateY(6px)} to{opacity:1;transform:scale(1) translateY(0)} }

    .check-circle { width:26px; height:26px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .18s; }
    .task-card.cat-work .check-circle     { border-color:var(--cat-work); }
    .task-card.cat-personal .check-circle  { border-color:var(--cat-personal); }
    .task-card.cat-health .check-circle   { border-color:var(--cat-health); }
    .task-card.cat-shopping .check-circle  { border-color:var(--cat-shopping); }
    .task-card.cat-other .check-circle    { border-color:var(--cat-other); }
    .check-circle.done-check { background:var(--accent); border-color:var(--accent); }
    .check-icon { display:none; }
    .check-circle.done-check .check-icon { display:block; }

    .task-body { flex:1; min-width:0; }
    .task-name { font-size:.95rem; font-weight:600; line-height:1.3; word-break:break-word; }
    .done .task-name { text-decoration:line-through; color:var(--ink-dim); }
    .task-foot { display:flex; align-items:center; gap:8px; margin-top:5px; flex-wrap:wrap; }
    .badge { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:2px 7px; border-radius:20px; }
    .task-card.cat-work .badge    { background:rgba(79,172,254,.15);  color:var(--cat-work); }
    .task-card.cat-personal .badge { background:rgba(167,139,250,.15); color:var(--cat-personal); }
    .task-card.cat-health .badge  { background:rgba(52,211,153,.15);  color:var(--cat-health); }
    .task-card.cat-shopping .badge { background:rgba(251,191,36,.15);  color:var(--cat-shopping); }
    .task-card.cat-other .badge   { background:rgba(148,163,184,.15); color:var(--cat-other); }
    .due-tag { font-size:.72rem; color:var(--ink-dim); font-weight:500; }
    .due-tag.overdue { color:var(--accent); }
    .del-btn { background:none; border:none; color:var(--ink-dim); padding:8px; cursor:pointer; flex-shrink:0; border-radius:10px; transition:color .15s,background .15s; }
    .del-btn:active { color:var(--accent); background:rgba(255,107,53,.15); }

    .sec-head { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--ink-dim); margin:18px 0 10px 2px; }
    .sec-head:first-child { margin-top:4px; }
    .empty { text-align:center; padding:50px 20px; color:var(--ink-dim); font-size:.88rem; }
    .empty-icon { font-size:2.4rem; margin-bottom:10px; }

    /* FAB */
    .bottom-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; padding:10px 20px calc(var(--safe-bottom) + 10px); background:linear-gradient(to top,var(--bg) 70%,transparent); display:flex; align-items:center; justify-content:center; z-index:50; }
    .fab { background:var(--accent); color:#fff; border:none; border-radius:50px; padding:14px 32px; font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; box-shadow:0 8px 24px rgba(255,107,53,.4); transition:transform .15s,box-shadow .15s; display:flex; align-items:center; gap:8px; }
    .fab:active { transform:scale(.96); box-shadow:0 4px 12px rgba(255,107,53,.3); }

    /* SHEET */
    .sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; opacity:0; pointer-events:none; transition:opacity .25s; backdrop-filter:blur(3px); }
    .sheet-overlay.open { opacity:1; pointer-events:all; }
    .sheet { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; background:var(--surface); border-radius:24px 24px 0 0; padding:12px 20px calc(var(--safe-bottom) + 32px); z-index:101; transition:transform .3s cubic-bezier(.34,1.2,.64,1); }
    .sheet.open { transform:translateX(-50%) translateY(0); }
    .sheet-handle { width:40px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 20px; }
    .sheet h2 { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; margin-bottom:18px; }
    .field-label { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--ink-dim); margin-bottom:8px; }
    .field-group { margin-bottom:16px; }
    .sheet input[type="text"], .sheet input[type="date"] { width:100%; background:var(--surface2); border:1.5px solid var(--border); border-radius:12px; padding:14px 16px; font-family:'Nunito',sans-serif; font-size:1rem; color:var(--ink); outline:none; transition:border-color .18s; -webkit-appearance:none; }
    .sheet input:focus { border-color:var(--accent); }
    .cat-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
    .cat-opt { background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; padding:10px 4px; text-align:center; cursor:pointer; transition:all .18s; font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.3px; color:var(--ink-dim); font-family:'Nunito',sans-serif; }
    .cat-opt .cat-icon { font-size:1.3rem; display:block; margin-bottom:3px; }
    .cat-opt.sel-work    { border-color:var(--cat-work);     color:var(--cat-work);     background:rgba(79,172,254,.12); }
    .cat-opt.sel-personal { border-color:var(--cat-personal); color:var(--cat-personal); background:rgba(167,139,250,.12); }
    .cat-opt.sel-health  { border-color:var(--cat-health);   color:var(--cat-health);   background:rgba(52,211,153,.12); }
    .cat-opt.sel-shopping { border-color:var(--cat-shopping); color:var(--cat-shopping); background:rgba(251,191,36,.12); }
    .cat-opt.sel-other   { border-color:var(--cat-other);    color:var(--cat-other);    background:rgba(148,163,184,.12); }
    .sheet-submit { width:100%; background:var(--accent); color:#fff; border:none; border-radius:14px; padding:16px; font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:700; cursor:pointer; margin-top:6px; transition:transform .15s; }
    .sheet-submit:active { transform:scale(.98); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(1); opacity:.5; }
    .overdue-card { border-color:rgba(255,107,53,.3) !important; }

    /* SHOPPING SUBLIST */
    .task-card.cat-shopping { flex-wrap:wrap; align-items:flex-start; }
    .task-card.cat-shopping .check-circle { margin-top:2px; }
    .task-card.cat-shopping .task-body { min-width:0; }
    .task-card.cat-shopping .del-btn { margin-top:0; }

    .shopping-sublist {
      width:100%; margin-top:12px;
      border-top:1px solid var(--border);
      padding-top:10px;
    }

    .shop-item {
      display:flex; align-items:center; gap:8px;
      padding:6px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);
      animation:popIn .18s ease;
    }
    .shop-item:last-of-type { border-bottom:none; }

    .shop-check {
      width:20px; height:20px; border-radius:50%;
      border:2px solid var(--cat-shopping);
      flex-shrink:0; display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all .18s;
    }
    .shop-check.checked { background:var(--cat-shopping); border-color:var(--cat-shopping); }
    .shop-check.checked svg { display:block; }
    .shop-check svg { display:none; }

    .shop-qty {
      width:38px; background:var(--surface2); border:1.5px solid var(--border);
      border-radius:8px; padding:5px 6px; font-family:'Nunito',sans-serif;
      font-size:.82rem; color:var(--ink); text-align:center; outline:none;
      -webkit-appearance:none; transition:border-color .15s;
    }
    .shop-qty:focus { border-color:var(--cat-shopping); }

    .shop-name {
      flex:1; background:none; border:none; border-bottom:1px solid transparent;
      font-family:'Nunito',sans-serif; font-size:.88rem; color:var(--ink);
      outline:none; padding:4px 2px; transition:border-color .15s;
      -webkit-appearance:none;
    }
    .shop-name:focus { border-bottom-color:var(--cat-shopping); }
    .shop-name.bought { text-decoration:line-through; color:var(--ink-dim); }
    .shop-name::placeholder { color:var(--ink-dim); }

    .shop-del {
      background:none; border:none; color:var(--border);
      padding:4px; cursor:pointer; border-radius:6px; flex-shrink:0;
      transition:color .15s;
    }
    .shop-del:active { color:var(--accent); }

    .shop-add-row {
      display:flex; align-items:center; gap:8px; margin-top:8px;
    }
    .shop-add-btn {
      display:flex; align-items:center; gap:5px;
      background:rgba(251,191,36,.1); border:1.5px dashed rgba(251,191,36,.35);
      border-radius:10px; padding:7px 12px; color:var(--cat-shopping);
      font-family:'Nunito',sans-serif; font-size:.8rem; font-weight:600;
      cursor:pointer; transition:background .15s; width:100%;
      justify-content:center;
    }
    .shop-add-btn:active { background:rgba(251,191,36,.2); }

    .shop-summary {
      font-size:.7rem; color:var(--ink-dim); margin-top:6px; text-align:right;
    }

    /* REMINDER BADGE on card */
    .reminder-badge {
      display:inline-flex; align-items:center; gap:3px;
      font-size:.68rem; font-weight:600; color:var(--accent2);
      background:rgba(255,209,102,.1); border-radius:20px;
      padding:2px 7px;
    }

    /* REMINDER SECTION in sheet */
    .reminder-toggle {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--surface2); border:1.5px solid var(--border);
      border-radius:12px; padding:13px 16px; cursor:pointer;
      transition:border-color .18s;
    }
    .reminder-toggle.on { border-color:var(--accent2); }
    .reminder-toggle-label { font-size:.9rem; font-weight:500; display:flex; align-items:center; gap:8px; }
    .toggle-pill {
      width:38px; height:22px; border-radius:20px; background:var(--border);
      position:relative; transition:background .2s; flex-shrink:0;
    }
    .toggle-pill::after {
      content:''; position:absolute; width:16px; height:16px; border-radius:50%;
      background:#fff; top:3px; left:3px; transition:transform .2s;
    }
    .reminder-toggle.on .toggle-pill { background:var(--accent2); }
    .reminder-toggle.on .toggle-pill::after { transform:translateX(16px); }

    .reminder-options {
      display:none; margin-top:12px;
      background:var(--surface2); border-radius:12px; padding:14px;
      border:1.5px solid var(--border);
    }
    .reminder-options.visible { display:block; }

    .reminder-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
    .reminder-row:last-child { margin-bottom:0; }
    .reminder-row label { font-size:.75rem; color:var(--ink-dim); font-weight:600; text-transform:uppercase; letter-spacing:.5px; width:100%; }

    .r-type-btn {
      flex:1; padding:8px 6px; border-radius:8px; border:1.5px solid var(--border);
      background:none; color:var(--ink-dim); font-family:'Nunito',sans-serif;
      font-size:.78rem; font-weight:600; cursor:pointer; text-align:center;
      transition:all .15s; white-space:nowrap;
    }
    .r-type-btn.active { border-color:var(--accent2); color:var(--accent2); background:rgba(255,209,102,.1); }

    .r-input {
      flex:1; background:var(--surface); border:1.5px solid var(--border);
      border-radius:8px; padding:8px 10px; font-family:'Nunito',sans-serif;
      font-size:.88rem; color:var(--ink); outline:none; transition:border-color .15s;
      -webkit-appearance:none; min-width:0;
    }
    .r-input:focus { border-color:var(--accent2); }
    .r-input[type="time"]::-webkit-calendar-picker-indicator { filter:invert(1); opacity:.4; }

    .r-days-select {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:8px; padding:8px 10px; font-family:'Nunito',sans-serif;
      font-size:.88rem; color:var(--ink); outline:none; cursor:pointer;
    }

    .r-sub { display:none; }
    .r-sub.visible { display:flex; flex-direction:column; gap:10px; margin-top:10px; }
  </style>
</head>
<body>

<div id="install-banner">
  <div class="install-icon">✅</div>
  <div class="install-text">
    <strong>Install Taskboard</strong>
    <span>Tap Install for the full app experience</span>
  </div>
  <div class="install-actions">
    <button class="btn-install" id="btn-install">Install</button>
    <button class="btn-dismiss" id="btn-dismiss">✕</button>
  </div>
</div>

<div class="app-header">
  <div class="header-row">
    <div class="app-title">Task<span>board</span></div>
    <div class="summary-pill" id="summary-pill">0 tasks</div>
  </div>
</div>

<div class="chip-scroll" id="chip-scroll">
  <button class="chip active-chip" data-filter="all">All</button>
  <button class="chip" data-filter="active">Active</button>
  <button class="chip" data-filter="done">Done</button>
  <button class="chip cat-work" data-cat="work">💼 Work</button>
  <button class="chip cat-personal" data-cat="personal">🏠 Personal</button>
  <button class="chip cat-health" data-cat="health">🏃 Health</button>
  <button class="chip cat-shopping" data-cat="shopping">🛒 Shopping</button>
  <button class="chip cat-other" data-cat="other">📌 Other</button>
</div>

<div class="scroll-area" id="scroll-area"></div>

<div class="bottom-bar">
  <button class="fab" id="open-sheet">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Task
  </button>
</div>

<div class="sheet-overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <h2>Add a Task</h2>
  <div class="field-group">
    <div class="field-label">Task name</div>
    <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off"/>
  </div>
  <div class="field-group">
    <div class="field-label">Category</div>
    <div class="cat-grid">
      <button class="cat-opt sel-work" data-cat="work"><span class="cat-icon">💼</span>Work</button>
      <button class="cat-opt" data-cat="personal"><span class="cat-icon">🏠</span>Personal</button>
      <button class="cat-opt" data-cat="health"><span class="cat-icon">🏃</span>Health</button>
      <button class="cat-opt" data-cat="shopping"><span class="cat-icon">🛒</span>Shopping</button>
      <button class="cat-opt" data-cat="other"><span class="cat-icon">📌</span>Other</button>
    </div>
  </div>
  <div class="field-group">
    <div class="field-label">Due date (optional)</div>
    <input type="date" id="due-input"/>
  </div>

  <!-- REMINDER -->
  <div class="field-group">
    <div class="field-label">Reminder</div>
    <div class="reminder-toggle" id="reminder-toggle">
      <span class="reminder-toggle-label">🔔 Set a reminder</span>
      <div class="toggle-pill"></div>
    </div>
    <div class="reminder-options" id="reminder-options">
      <!-- Type selector -->
      <div class="reminder-row">
        <label>Reminder type</label>
        <button class="r-type-btn active" data-rtype="daily">🕘 Daily time</button>
        <button class="r-type-btn" data-rtype="before">📅 Before due date</button>
      </div>

      <!-- Daily time sub-section -->
      <div class="r-sub visible" id="r-daily-sub">
        <div class="reminder-row">
          <label>Fire every day at</label>
          <input class="r-input" type="time" id="r-daily-time" value="09:00"/>
        </div>
      </div>

      <!-- Before due date sub-section -->
      <div class="r-sub" id="r-before-sub">
        <div class="reminder-row">
          <label>How many days before due</label>
          <select class="r-days-select r-input" id="r-before-days">
            <option value="0">On the due day</option>
            <option value="1" selected>1 day before</option>
            <option value="2">2 days before</option>
            <option value="3">3 days before</option>
            <option value="7">1 week before</option>
          </select>
        </div>
        <div class="reminder-row">
          <label>At what time</label>
          <input class="r-input" type="time" id="r-before-time" value="09:00"/>
        </div>
      </div>
    </div>
  </div>

  <button class="sheet-submit" id="submit-btn">Add Task →</button>
</div>

<script>
  // ── Service Worker ──────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/Taskboard/sw.js', { scope: '/Taskboard/' })
      .then(() => { console.log('SW registered ✓'); syncTasksToSW(); })
      .catch(e => console.warn('SW failed:', e));
  }

  // ── Notification permission ─────────────────────
  async function requestNotifPermission() {
    if (!('Notification' in window)) return false;
    if (Notification.permission === 'granted') return true;
    if (Notification.permission === 'denied') return false;
    const result = await Notification.requestPermission();
    return result === 'granted';
  }

  // ── Sync tasks to SW for reminder heartbeat ─────
  function syncTasksToSW() {
    if (!navigator.serviceWorker.controller) return;
    navigator.serviceWorker.controller.postMessage({ type: 'SYNC_TASKS', tasks });
  }

  // ── PWA Install Prompt ──────────────────────────
  let deferredPrompt = null;
  const banner  = document.getElementById('install-banner');
  const btnInst = document.getElementById('btn-install');
  const btnDism = document.getElementById('btn-dismiss');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(() => banner.classList.add('show'), 2000);
  });
  btnInst.addEventListener('click', async () => {
    banner.classList.remove('show');
    if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
  });
  btnDism.addEventListener('click', () => { banner.classList.remove('show'); });
  window.addEventListener('appinstalled', () => { banner.classList.remove('show'); deferredPrompt = null; });

  // ── State ───────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('tb_tasks') || '[]');
  let filterStatus = 'all', filterCat = null, selectedCat = 'work';
  const save = () => { localStorage.setItem('tb_tasks', JSON.stringify(tasks)); syncTasksToSW(); }

  // ── Render ──────────────────────────────────────
  function render() {
    const area = document.getElementById('scroll-area');
    area.innerHTML = '';
    const today = new Date().toISOString().slice(0,10);
    const visible = tasks.filter(t => {
      if (filterCat && t.cat !== filterCat) return false;
      if (filterStatus === 'active' && t.done)  return false;
      if (filterStatus === 'done'   && !t.done) return false;
      return true;
    });
    const active = visible.filter(t => !t.done);
    const done   = visible.filter(t =>  t.done);

    if (filterStatus !== 'done') {
      const h = document.createElement('div');
      h.className = 'sec-head';
      h.textContent = active.length ? `Active — ${active.length}` : 'Active';
      area.appendChild(h);
      if (!active.length) area.innerHTML += `<div class="empty"><div class="empty-icon">✨</div>All clear!</div>`;
      else active.forEach(t => area.appendChild(makeCard(t, today)));
    }
    if (filterStatus !== 'active' && done.length) {
      const h = document.createElement('div');
      h.className = 'sec-head'; h.textContent = `Completed — ${done.length}`;
      area.appendChild(h);
      done.forEach(t => area.appendChild(makeCard(t, today)));
    }

    const total = tasks.length, doneN = tasks.filter(t=>t.done).length;
    const over  = tasks.filter(t => !t.done && t.due && t.due < today).length;
    document.getElementById('summary-pill').innerHTML =
      total === 0 ? '0 tasks' : `<b>${doneN}/${total}</b> done${over ? ` · ⚠️ ${over}` : ''}`;
  }

  function makeCard(task, today) {
    const card = document.createElement('div');
    const over = !task.done && task.due && task.due < today;
    card.className = `task-card cat-${task.cat}${task.done?' done':''}${over?' overdue-card':''}`;
    const lbl = {work:'Work',personal:'Personal',health:'Health',shopping:'Shopping',other:'Other'}[task.cat];
    const ds  = task.due ? formatDate(task.due) : '';
    card.innerHTML = `
      <div class="check-circle ${task.done?'done-check':''}">
        <svg class="check-icon" width="13" height="11" viewBox="0 0 13 11" fill="none">
          <path d="M1.5 5.5L5 9L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-body">
        <div class="task-name">${esc(task.text)}</div>
        <div class="task-foot">
          <span class="badge">${lbl}</span>
          ${ds?`<span class="due-tag ${over?'overdue':''}">📅 ${ds}${over?' · Overdue':''}</span>`:''}
          ${task.reminder ? `<span class="reminder-badge">🔔 ${reminderLabel(task.reminder)}</span>` : ''}
        </div>
      </div>
      <button class="del-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
      ${task.cat === 'shopping' ? renderSublist(task) : ''}`;

    card.querySelector('.check-circle').addEventListener('click', () => { task.done=!task.done; save(); render(); });
    card.querySelector('.del-btn').addEventListener('click', e => {
      e.stopPropagation();
      Object.assign(card.style,{transition:'opacity .2s,transform .2s',opacity:'0',transform:'scale(0.92)'});
      setTimeout(()=>{ tasks=tasks.filter(t=>t.id!==task.id); save(); render(); },200);
    });

    if (task.cat === 'shopping') bindSublist(card, task);
    return card;
  }

  function renderSublist(task) {
    if (!task.items) task.items = [];
    const rows = task.items.map((item, i) => `
      <div class="shop-item" data-idx="${i}">
        <div class="shop-check ${item.done?'checked':''}" data-idx="${i}">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <input class="shop-qty" type="number" min="1" value="${esc(String(item.qty||1))}" data-idx="${i}" placeholder="1"/>
        <input class="shop-name ${item.done?'bought':''}" type="text" value="${esc(item.name||'')}" data-idx="${i}" placeholder="Item name…"/>
        <button class="shop-del" data-idx="${i}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`).join('');

    const bought  = task.items.filter(i=>i.done).length;
    const total   = task.items.length;
    const summary = total > 0 ? `${bought}/${total} items checked` : '';

    return `
      <div class="shopping-sublist">
        ${rows}
        <div class="shop-add-row">
          <button class="shop-add-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add item
          </button>
        </div>
        ${summary ? `<div class="shop-summary">${summary}</div>` : ''}
      </div>`;
  }

  function bindSublist(card, task) {
    const sublist = card.querySelector('.shopping-sublist');
    if (!sublist) return;

    // Check toggle
    sublist.querySelectorAll('.shop-check').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const i = +el.dataset.idx;
        task.items[i].done = !task.items[i].done;
        save();
        // update visually without full re-render
        el.classList.toggle('checked', task.items[i].done);
        const nameEl = sublist.querySelector(`.shop-name[data-idx="${i}"]`);
        if (nameEl) nameEl.classList.toggle('bought', task.items[i].done);
        updateSummary(sublist, task);
      });
    });

    // Qty change
    sublist.querySelectorAll('.shop-qty').forEach(el => {
      el.addEventListener('change', e => {
        e.stopPropagation();
        const i = +el.dataset.idx;
        task.items[i].qty = Math.max(1, parseInt(el.value)||1);
        el.value = task.items[i].qty;
        save();
      });
      el.addEventListener('click', e => e.stopPropagation());
    });

    // Name change
    sublist.querySelectorAll('.shop-name').forEach(el => {
      el.addEventListener('input', e => {
        e.stopPropagation();
        const i = +el.dataset.idx;
        task.items[i].name = el.value;
        save();
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); addShopItem(sublist, task); }
        e.stopPropagation();
      });
      el.addEventListener('click', e => e.stopPropagation());
    });

    // Delete item
    sublist.querySelectorAll('.shop-del').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const i = +el.dataset.idx;
        task.items.splice(i, 1);
        save();
        // re-render sublist in place
        const newHtml = renderSublist(task);
        const tmp = document.createElement('div');
        tmp.innerHTML = newHtml;
        sublist.replaceWith(tmp.firstElementChild);
        bindSublist(card, task);
      });
    });

    // Add item
    sublist.querySelector('.shop-add-btn').addEventListener('click', e => {
      e.stopPropagation();
      addShopItem(sublist, task, card);
    });
  }

  function addShopItem(sublist, task, card) {
    if (!task.items) task.items = [];
    task.items.push({ name:'', qty:1, done:false });
    save();
    const newHtml = renderSublist(task);
    const tmp = document.createElement('div');
    tmp.innerHTML = newHtml;
    const newSublist = tmp.firstElementChild;
    sublist.replaceWith(newSublist);
    bindSublist(card || sublist.closest('.task-card'), task);
    // focus the new name input
    const inputs = newSublist.querySelectorAll('.shop-name');
    if (inputs.length) inputs[inputs.length-1].focus();
  }

  function updateSummary(sublist, task) {
    let s = sublist.querySelector('.shop-summary');
    const bought = task.items.filter(i=>i.done).length;
    const total  = task.items.length;
    if (total === 0) { if(s) s.remove(); return; }
    if (!s) { s = document.createElement('div'); s.className='shop-summary'; sublist.appendChild(s); }
    s.textContent = `${bought}/${total} items checked`;
  }

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const formatDate = iso => { const [y,m,d]=iso.split('-'); return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
  const reminderLabel = r => r.dailyTime ? `Daily ${r.dailyTime}` : `${r.beforeDueDays===0?'Due day':r.beforeDueDays+'d before'} at ${r.customTime}`;

  // ── Reminder UI wiring ────────────────────────────
  let reminderEnabled = false;
  let reminderType = 'daily'; // 'daily' | 'before'

  const reminderToggle  = document.getElementById('reminder-toggle');
  const reminderOptions = document.getElementById('reminder-options');
  const rDailySub       = document.getElementById('r-daily-sub');
  const rBeforeSub      = document.getElementById('r-before-sub');

  reminderToggle.addEventListener('click', async () => {
    reminderEnabled = !reminderEnabled;
    reminderToggle.classList.toggle('on', reminderEnabled);
    reminderOptions.classList.toggle('visible', reminderEnabled);
    if (reminderEnabled) {
      const granted = await requestNotifPermission();
      if (!granted) {
        reminderEnabled = false;
        reminderToggle.classList.remove('on');
        reminderOptions.classList.remove('visible');
        alert('Please allow notifications in your browser settings to use reminders.');
      }
    }
  });

  document.querySelectorAll('.r-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      reminderType = btn.dataset.rtype;
      document.querySelectorAll('.r-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      rDailySub.classList.toggle('visible', reminderType === 'daily');
      rBeforeSub.classList.toggle('visible', reminderType === 'before');
    });
  });

  function getReminder() {
    if (!reminderEnabled) return null;
    if (reminderType === 'daily') {
      return { dailyTime: document.getElementById('r-daily-time').value || '09:00' };
    } else {
      return {
        beforeDue: true,
        beforeDueDays: parseInt(document.getElementById('r-before-days').value),
        customTime: document.getElementById('r-before-time').value || '09:00'
      };
    }
  }

  function resetReminderUI() {
    reminderEnabled = false;
    reminderType = 'daily';
    reminderToggle.classList.remove('on');
    reminderOptions.classList.remove('visible');
    document.querySelectorAll('.r-type-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    rDailySub.classList.add('visible');
    rBeforeSub.classList.remove('visible');
    document.getElementById('r-daily-time').value = '09:00';
    document.getElementById('r-before-time').value = '09:00';
    document.getElementById('r-before-days').value = '1';
  }

  // ── Sheet ────────────────────────────────────────
  const sheet   = document.getElementById('sheet');
  const overlay = document.getElementById('overlay');
  const openSheet  = () => { sheet.classList.add('open'); overlay.classList.add('open'); setTimeout(()=>document.getElementById('task-input').focus(),350); };
  const closeSheet = () => { sheet.classList.remove('open'); overlay.classList.remove('open'); };

  document.getElementById('open-sheet').addEventListener('click', openSheet);
  overlay.addEventListener('click', closeSheet);
  let startY = 0;
  sheet.addEventListener('touchstart', e=>{startY=e.touches[0].clientY;},{passive:true});
  sheet.addEventListener('touchend',   e=>{if(e.changedTouches[0].clientY-startY>80)closeSheet();},{passive:true});

  document.querySelectorAll('.cat-opt').forEach(btn => {
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.cat-opt').forEach(b=>b.className='cat-opt');
      btn.classList.add(`sel-${btn.dataset.cat}`); selectedCat=btn.dataset.cat;
    });
  });

  function addTask() {
    const text = document.getElementById('task-input').value.trim();
    if (!text) { document.getElementById('task-input').focus(); return; }
    const reminder = getReminder();
    tasks.unshift({id:Date.now(),text,cat:selectedCat,due:document.getElementById('due-input').value||null,done:false,items:selectedCat==='shopping'?[{name:'',qty:1,done:false}]:[],reminder});
    save(); render(); closeSheet();
    document.getElementById('task-input').value='';
    document.getElementById('due-input').value='';
    resetReminderUI();
  }
  document.getElementById('submit-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e=>{if(e.key==='Enter')addTask();});

  // ── Filters ──────────────────────────────────────
  document.getElementById('chip-scroll').querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', ()=>{
      if (btn.dataset.filter) {
        filterStatus=btn.dataset.filter;
        document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active-chip'));
        btn.classList.add('active-chip');
      } else if (btn.dataset.cat) {
        const cat=btn.dataset.cat;
        if(filterCat===cat){filterCat=null;btn.classList.remove('active-chip');}
        else{filterCat=cat;document.querySelectorAll('[data-cat]').forEach(b=>b.classList.remove('active-chip'));btn.classList.add('active-chip');}
      }
      render();
    });
  });

  render();
</script>
</body>
</html>
