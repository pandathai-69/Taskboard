<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #111; color: #fff; max-width: 480px; margin: 0 auto; min-height: 100vh; }

header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 1.8rem; font-weight: 900; }
header h1 span { color: #ff6b35; }
#summary { background: #222; border-radius: 20px; padding: 5px 14px; font-size: 0.8rem; color: #aaa; }

.filters { padding: 10px 20px; display: flex; gap: 8px; overflow-x: auto; }
.filters button { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #333; background: none; color: #aaa; font-size: 0.8rem; cursor: pointer; }
.filters button.active { border-color: #ff6b35; color: #ff6b35; }

#list { padding: 10px 16px 100px; }

.task { background: #1e1e1e; border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border-left: 3px solid #444; }
.task.work { border-left-color: #4facfe; }
.task.personal { border-left-color: #a78bfa; }
.task.health { border-left-color: #34d399; }
.task.shopping { border-left-color: #fbbf24; }
.task.other { border-left-color: #94a3b8; }
.task.done { opacity: 0.5; }

.circle { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #555; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; }
.circle.checked { background: #ff6b35; border-color: #ff6b35; }

.task-info { flex: 1; }
.task-name { font-size: 0.95rem; font-weight: 600; }
.done .task-name { text-decoration: line-through; color: #666; }
.task-meta { font-size: 0.72rem; color: #888; margin-top: 4px; }

.del { background: none; border: none; color: #555; font-size: 1.1rem; cursor: pointer; padding: 4px 8px; }

.empty { text-align: center; padding: 60px 20px; color: #555; }

.fab-wrap { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 16px 20px; background: linear-gradient(to top, #111 60%, transparent); }
.fab { width: 100%; background: #ff6b35; color: #fff; border: none; border-radius: 14px; padding: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10; }
.overlay.show { display: block; }

.sheet { display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #1a1a1a; border-radius: 24px 24px 0 0; padding: 16px 20px 40px; z-index: 11; }
.sheet.show { display: block; }

.handle { width: 40px; height: 4px; background: #333; border-radius: 4px; margin: 0 auto 20px; }
.sheet h2 { font-size: 1.1rem; margin-bottom: 16px; }
.label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.field { margin-bottom: 14px; }

input[type="text"], input[type="date"] {
  width: 100%; background: #111; border: 1.5px solid #333; border-radius: 10px;
  padding: 12px 14px; color: #fff; font-size: 1rem; outline: none;
}
input:focus { border-color: #ff6b35; }

.cats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.cat-btn { background: #111; border: 1.5px solid #333; border-radius: 10px; padding: 8px 4px; text-align: center; cursor: pointer; font-size: 0.6rem; color: #888; }
.cat-btn span { display: block; font-size: 1.2rem; margin-bottom: 2px; }
.cat-btn.sel { border-color: #ff6b35; color: #ff6b35; background: rgba(255,107,53,0.1); }

.submit { width: 100%; background: #ff6b35; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <h1>Task<span>board</span></h1>
  <div id="summary">0 tasks</div>
</header>

<div class="filters">
  <button class="active" onclick="setFilter('all',this)">All</button>
  <button onclick="setFilter('active',this)">Active</button>
  <button onclick="setFilter('done',this)">Done</button>
</div>

<div id="list"></div>

<div class="fab-wrap">
  <button class="fab" onclick="openSheet()">+ New Task</button>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<div class="sheet" id="sheet">
  <div class="handle"></div>
  <h2>Add a Task</h2>

  <div class="field">
    <div class="label">Task name</div>
    <input type="text" id="task-input" placeholder="What needs to be done?">
  </div>

  <div class="field">
    <div class="label">Category</div>
    <div class="cats">
      <button class="cat-btn sel" data-cat="work" onclick="selectCat(this)"><span>💼</span>Work</button>
      <button class="cat-btn" data-cat="personal" onclick="selectCat(this)"><span>🏠</span>Home</button>
      <button class="cat-btn" data-cat="health" onclick="selectCat(this)"><span>🏃</span>Health</button>
      <button class="cat-btn" data-cat="shopping" onclick="selectCat(this)"><span>🛒</span>Shop</button>
      <button class="cat-btn" data-cat="other" onclick="selectCat(this)"><span>📌</span>Other</button>
    </div>
  </div>

  <div class="field">
    <div class="label">Due date (optional)</div>
    <input type="date" id="due-input">
  </div>

  <button class="submit" onclick="addTask()">Add Task</button>
</div>

<script>
var tasks = [];
var filter = 'all';
var selCat = 'work';

try { tasks = JSON.parse(localStorage.getItem('tasks') || '[]'); } catch(e) { tasks = []; }

function save() {
  try { localStorage.setItem('tasks', JSON.stringify(tasks)); } catch(e) {}
}

function render() {
  var list = document.getElementById('list');
  var today = new Date().toISOString().slice(0,10);

  var visible = tasks.filter(function(t) {
    if (filter === 'active') return !t.done;
    if (filter === 'done') return t.done;
    return true;
  });

  if (visible.length === 0) {
    list.innerHTML = '<div class="empty">No tasks yet.<br>Tap + New Task to add one.</div>';
  } else {
    list.innerHTML = '';
    visible.forEach(function(t) {
      var over = !t.done && t.due && t.due < today;
      var div = document.createElement('div');
      div.className = 'task ' + t.cat + (t.done ? ' done' : '');
      div.innerHTML =
        '<div class="circle ' + (t.done ? 'checked' : '') + '" onclick="toggle(' + t.id + ')">' +
          (t.done ? '✓' : '') +
        '</div>' +
        '<div class="task-info">' +
          '<div class="task-name">' + esc(t.text) + '</div>' +
          '<div class="task-meta">' + t.cat + (t.due ? ' · ' + t.due + (over ? ' ⚠️' : '') : '') + '</div>' +
        '</div>' +
        '<button class="del" onclick="del(' + t.id + ')">🗑</button>';
      list.appendChild(div);
    });
  }

  var done = tasks.filter(function(t){ return t.done; }).length;
  document.getElementById('summary').textContent = done + '/' + tasks.length + ' done';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggle(id) {
  tasks.forEach(function(t){ if(t.id===id) t.done=!t.done; });
  save(); render();
}

function del(id) {
  tasks = tasks.filter(function(t){ return t.id!==id; });
  save(); render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filters button').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function openSheet() {
  document.getElementById('sheet').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('sel'); });
  btn.classList.add('sel');
  selCat = btn.getAttribute('data-cat');
}

function addTask() {
  var text = document.getElementById('task-input').value.trim();
  if (!text) return;
  tasks.unshift({
    id: Date.now(),
    text: text,
    cat: selCat,
    due: document.getElementById('due-input').value || null,
    done: false
  });
  save();
  render();
  closeSheet();
  document.getElementById('task-input').value = '';
  document.getElementById('due-input').value = '';
}

render();
</script>
</body>
</html>
